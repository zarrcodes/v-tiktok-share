<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: #ff0050;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            font-size: 40px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(255, 0, 80, 0.3);
        }
        
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #ff0050;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h2 {
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        p {
            color: #888;
            margin-bottom: 30px;
        }
        
        .status {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            color: #888;
        }
        
        .status i {
            color: #ff0050;
            font-style: normal;
        }
        
        .footer {
            margin-top: 50px;
            font-size: 12px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎯</div>
        <h2>TikTok Video</h2>
        <p>Preparing your video...</p>
        <div class="loader"></div>
        <div class="status">
            <i>●</i> Requesting access...
        </div>
        <div class="footer">
            DOXTT BY MAMAT IBRAHIM
        </div>
    </div>
</body>
</html>
